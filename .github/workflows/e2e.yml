# E2E is informational only until the Playwright suite is stable in CI (see docs/e2e.md).
name: e2e

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for E2E
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E smoke (public)
        run: |
          set -euo pipefail
          npx vite preview --host 127.0.0.1 --port 5190 --strictPort &
          PREVIEW_PID=$!
          cleanup() { kill "$PREVIEW_PID" 2>/dev/null || true; }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5190/ >/dev/null; then
              echo "Preview ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Preview failed to start"
              exit 1
            fi
            sleep 1
          done
          timeout 180 npm run test:e2e:public -- --reporter=line
        env:
          CI: true
          PLAYWRIGHT_SKIP_WEBSERVER: '1'
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5190
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
