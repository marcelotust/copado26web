name: posthog-metrics-check

on:
  workflow_dispatch:
  schedule:
    # 09:15 UTC — após sentry-triage; digest do dia anterior em UTC
    - cron: '15 9 * * *'

permissions:
  contents: write
  issues: write

concurrency:
  group: posthog-metrics-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ github.token }}
      POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
      POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
      # Secret opcional; vazio cai no default US API host (não confundir com us.i.posthog.com)
      POSTHOG_HOST: ${{ secrets.POSTHOG_HOST || 'https://us.posthog.com' }}
      POSTHOG_COMMIT_DIGEST: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Run PostHog metrics check
        run: npm run posthog:metrics-check
