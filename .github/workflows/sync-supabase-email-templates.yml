name: sync-supabase-email-templates

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/config.toml'
      - 'supabase/templates/**'
      - 'scripts/sync-auth-email-templates.mjs'
      - '.github/workflows/sync-supabase-email-templates.yml'

concurrency:
  group: sync-supabase-email-templates
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Check required secrets
        run: npm run supabase:sync-email-templates -- --check-env

      - name: Sync auth email templates
        run: npm run supabase:sync-email-templates -- --skip-unchanged
